# EINS PVS Bridge: QUINCY (FREY ADV) Firebird DB-read.
#
# Engine: Firebird (confirmed via FREY's own backup documentation,
# which references the `gbak` tool and the Firebird /bin folder). The
# product is "QUINCY win"; Frey ADV GmbH is based in Königs
# Wusterhausen.
#
# Status: SCHEMA-DISCOVERY DRAFT. FREY does not publish the QUINCY
# schema. Column names below are hypotheses based on common German PVS
# naming and the QUINCY UI labels exposed in the Frey training PDFs.
# Schema-drift detector halts streams whose first poll returns
# different columns; a wrong guess fails loudly at first run, not
# silently with empty events.
#
# Keyset pagination (review finding 6): every stream pages by
# (AENDERUNGSZEIT, primary key) so a cluster of rows sharing one
# AENDERUNGSZEIT can never be split across a batch boundary. Firebird
# pages via SELECT FIRST (:limit) (the placeholder is parenthesised so
# the parser accepts the bind) plus the keyset ORDER BY. The tiebreak
# uses the RAW numeric PK column (PATIENT_ID, TERMIN_ID, ...) in the
# predicate and ORDER BY; the same column is CAST AS id so the framework
# reads it back per row. Assumes the *_ID columns are numeric and
# monotonic; Phase 6's real-engine harness confirms that per install.
#
# Worker contract reminder applies.

vendor: quincy-db
driver: firebird
bridgeSource: quincy
defaultIntervalSeconds: 90
batchSize: 500

connection:
  credentialId: quincy-db-default
  port: 3050
  # Absolute path to the QUINCY .fdb file on the Praxis server.
  # FREY install defaults to C:\Frey\QUINCY\Daten\QUINCY.FDB; the IT
  # contact confirms the actual path at --enable-db-adapter time.
  database: ""
  options:
    wireEncryption: true

streams:
  # ----- 1. Patients ----------------------------------------------------
  - kind: PatientUpserted
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(PATIENT_ID AS VARCHAR(40))   AS id,
        VORNAME                           AS vorname,
        NACHNAME                          AS nachname,
        EMAIL                             AS email,
        TEL_MOBIL                         AS telefon_mobil,
        TEL_PRIVAT                        AS telefon_privat,
        GEBURTSDATUM                      AS geburtsdatum,
        GESCHLECHT                        AS geschlecht,
        BEMERKUNG                         AS bemerkung,
        AENDERUNGSZEIT                    AS modified_at
      FROM PATIENT
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND PATIENT_ID > :cursorTiebreak))
      ORDER BY AENDERUNGSZEIT ASC, PATIENT_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:patient:{id}:{modified_at}" }
      occurredAt: { from: modified_at, transform: isoDateTime }
      pvsPatientId: id
      fullName: { template: "{vorname} {nachname}" }
      email: { from: email, transform: lowerEmail }
      phone: { from: telefon_mobil, transform: phone }
      dob: { from: geburtsdatum, transform: isoDate }
      gender: { from: geschlecht, transform: gender }
      bemerkung: { from: bemerkung, transform: bemerkung }

  # ----- 2. Appointments ------------------------------------------------
  - kind: AppointmentCreated
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(TERMIN_ID AS VARCHAR(40))    AS id,
        CAST(PATIENT_ID AS VARCHAR(40))   AS patient_id,
        TERMIN_BEGINN                     AS termin_beginn,
        LEISTUNG_KUERZEL                  AS leistung_kuerzel,
        LEISTUNG_BEZEICHNUNG              AS leistung_bezeichnung,
        RAUM_ID                           AS raum_id,
        RAUM_BEZEICHNUNG                  AS raum_bezeichnung,
        BEMERKUNG                         AS bemerkung,
        AENDERUNGSZEIT                    AS modified_at
      FROM TERMIN
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND TERMIN_ID > :cursorTiebreak))
      ORDER BY AENDERUNGSZEIT ASC, TERMIN_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:appointment:{id}" }
      occurredAt: { from: termin_beginn, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsAppointmentId: id
      scheduledAt: { from: termin_beginn, transform: isoDateTime }
      treatmentCode: leistung_kuerzel
      treatmentLabel: leistung_bezeichnung
      locationCode: raum_id
      locationLabel: raum_bezeichnung
      bemerkung: { from: bemerkung, transform: bemerkung }

  # ----- 3. Appointment status changes -----------------------------------
  - kind: AppointmentStatusChanged
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(TERMIN_ID AS VARCHAR(40))    AS id,
        CAST(PATIENT_ID AS VARCHAR(40))   AS patient_id,
        STATUS                            AS status,
        AENDERUNGSZEIT                    AS modified_at
      FROM TERMIN
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND TERMIN_ID > :cursorTiebreak))
        AND STATUS IS NOT NULL
      ORDER BY AENDERUNGSZEIT ASC, TERMIN_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:appointment-status:{id}:{status}:{modified_at}" }
      occurredAt: { from: modified_at, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsAppointmentId: id
      newStatus: { from: status, transform: appointmentStatus }
      changedAt: { from: modified_at, transform: isoDateTime }

  # ----- 4. Encounters --------------------------------------------------
  - kind: EncounterCompleted
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(BEHANDLUNG_ID AS VARCHAR(40))  AS id,
        CAST(PATIENT_ID AS VARCHAR(40))     AS patient_id,
        CAST(TERMIN_ID AS VARCHAR(40))      AS termin_id,
        BEHANDLUNG_DATUM                    AS behandlung_datum,
        LEISTUNG_KUERZEL                    AS leistung_kuerzel,
        LEISTUNG_BEZEICHNUNG                AS leistung_bezeichnung,
        BEHANDLER_KUERZEL                   AS behandler_kuerzel,
        AENDERUNGSZEIT                      AS modified_at
      FROM BEHANDLUNG
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND BEHANDLUNG_ID > :cursorTiebreak))
        AND TERMIN_ID IS NOT NULL
      ORDER BY AENDERUNGSZEIT ASC, BEHANDLUNG_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:encounter:{id}" }
      occurredAt: { from: behandlung_datum, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsEncounterId: id
      pvsAppointmentId: termin_id
      completedAt: { from: behandlung_datum, transform: isoDateTime }
      treatmentCode: leistung_kuerzel
      treatmentLabel: leistung_bezeichnung
      practitionerLabel: behandler_kuerzel

  # ----- 5. Invoices ----------------------------------------------------
  - kind: InvoicePaid
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(RECHNUNG_ID AS VARCHAR(40))    AS id,
        CAST(PATIENT_ID AS VARCHAR(40))     AS patient_id,
        CAST(TERMIN_ID AS VARCHAR(40))      AS termin_id,
        CAST(BEHANDLUNG_ID AS VARCHAR(40))  AS behandlung_id,
        BETRAG_GESAMT                       AS betrag,
        BEZAHLT_AM                          AS bezahlt_am,
        STATUS                              AS status,
        AENDERUNGSZEIT                      AS modified_at
      FROM RECHNUNG
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND RECHNUNG_ID > :cursorTiebreak))
        AND STATUS = 'bezahlt'
        AND TERMIN_ID IS NOT NULL
      ORDER BY AENDERUNGSZEIT ASC, RECHNUNG_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:invoice:{id}" }
      occurredAt: { from: bezahlt_am, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsInvoiceId: id
      pvsAppointmentId: termin_id
      pvsEncounterId: behandlung_id
      amountCents: { from: betrag, transform: amountToCents }
      currency: { literal: "EUR" }
      paidAt: { from: bezahlt_am, transform: isoDateTime }

  # ----- 6. Recalls ----------------------------------------------------
  - kind: RecallScheduled
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(WIEDERVORLAGE_ID AS VARCHAR(40))  AS id,
        CAST(PATIENT_ID AS VARCHAR(40))        AS patient_id,
        WIEDERVORLAGE_AM                       AS recall_zeit,
        LEISTUNG_KUERZEL                       AS leistung_kuerzel,
        LEISTUNG_BEZEICHNUNG                   AS leistung_bezeichnung,
        AENDERUNGSZEIT                         AS modified_at
      FROM WIEDERVORLAGE
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND WIEDERVORLAGE_ID > :cursorTiebreak))
      ORDER BY AENDERUNGSZEIT ASC, WIEDERVORLAGE_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:recall:{id}" }
      occurredAt: { from: recall_zeit, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsRecallId: id
      recallAt: { from: recall_zeit, transform: isoDateTime }
      treatmentCode: leistung_kuerzel
      treatmentLabel: leistung_bezeichnung

  # ----- 7. Invoice refunds / storno / Gutschrift (Phase 9) --------------
  # InvoiceRefunded: money OUT, one event per Storno / Gutschrift row, so the
  # derive worker nets the patient total + appointment bucket back down and the
  # P2-3 downgrade alarm catches a gewonnen -> lower flip. refundedAmountCents
  # must be a POSITIVE magnitude (the portal Zod rejects negatives), so it maps
  # through the absAmountToCents transform: the amount may arrive as a negative
  # betrag (a credit) or a positive amount on a storno-status row, and either
  # way the magnitude is taken. Inherits Phase 3 (Date bind) +
  # Phase 4 (keyset). No TERMIN_ID-NOT-NULL filter: an appt-less refund still
  # nets the patient total (derive bridges via the original invoice id).
  # SCHEMA-DISCOVERY DRAFT: storno predicate (BETRAG_GESAMT < 0 OR STATUS in
  # storniert/gutschrift) + refundedAt source (AENDERUNGSZEIT) are guesses;
  # disjoint from InvoicePaid (STATUS = 'bezahlt') by construction.
  # Cancellations stay on stream 3 (AppointmentStatusChanged -> cancelled); no
  # AppointmentCancelled stream until a real schema separates patient- vs
  # Praxis-side cancel.
  - kind: InvoiceRefunded
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT FIRST (:limit)
        CAST(RECHNUNG_ID AS VARCHAR(40))    AS id,
        CAST(PATIENT_ID AS VARCHAR(40))     AS patient_id,
        CAST(TERMIN_ID AS VARCHAR(40))      AS termin_id,
        BETRAG_GESAMT                       AS betrag,
        STATUS                              AS status,
        AENDERUNGSZEIT                      AS modified_at
      FROM RECHNUNG
      WHERE (AENDERUNGSZEIT > :cursor OR (AENDERUNGSZEIT = :cursor AND RECHNUNG_ID > :cursorTiebreak))
        AND (BETRAG_GESAMT < 0 OR STATUS IN ('storniert', 'gutschrift'))
      ORDER BY AENDERUNGSZEIT ASC, RECHNUNG_ID ASC
    map:
      pvsExternalEventId: { template: "quincy:refund:{id}:{modified_at}" }
      occurredAt: { from: modified_at, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsInvoiceId: id
      pvsAppointmentId: termin_id
      refundedAmountCents: { from: betrag, transform: absAmountToCents }
      refundedAt: { from: modified_at, transform: isoDateTime }
