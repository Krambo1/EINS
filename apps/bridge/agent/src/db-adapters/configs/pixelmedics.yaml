# EINS PVS Bridge: Pixelmedics (Borealys GmbH) DB-read.
#
# Engine: SQLite (HYPOTHESIS, pending vendor confirmation).
#
# Borealys GmbH is a small specialised vendor; the brief lists their
# product as 100% in-segment (aesthetic Praxen). Public docs do not
# disclose the storage layer. Karam owns the direct vendor
# conversation; once they confirm cloud-only architecture, this config
# moves to a REST adapter under apps/bridge/src/adapters/pixelmedics/
# (Bucket B pattern). If they confirm on-prem Postgres or MariaDB, we
# change `driver:` here and adjust the SQL syntax.
#
# Until then, SQLite is the most defensible default: small vendor +
# small data volumes + likely Electron-style stack = file-based store.
# The schema-drift detector and the SqliteDriver's fileMustExist:true
# guarantee a wrong-engine guess fails loudly at the first poll, not
# silently with empty events.
#
# Status: SCHEMA-DISCOVERY DRAFT. Column names below are hypotheses
# based on common aesthetic-PVS naming. Confirmed schema lands at
# first-customer onboarding.
#
# Keyset pagination (review finding 6): every stream pages by
# (modified_at, primary key) so a cluster of rows sharing one
# modified_at can never be split across a batch boundary. NOTE: this
# vendor's PK column is itself named `id`, and we CAST(id AS TEXT) AS id
# for the canonical event. A bare `id` in ORDER BY would bind to that
# TEXT output alias and sort lexically ("10" < "9"), which would skip
# rows because the framework advances the tiebreak numerically. We
# therefore qualify the tiebreak as `<table>.id` so the predicate and
# ORDER BY both compare the raw INTEGER column. Assumes `id` is numeric
# and monotonic; Phase 6's real-engine harness confirms that per install.
#
# Worker contract reminder applies.

vendor: pixelmedics-db
driver: sqlite
bridgeSource: pixelmedics
defaultIntervalSeconds: 90
batchSize: 500

connection:
  credentialId: pixelmedics-db-default
  # SQLite ignores port; the agent's secure-store still requires a
  # credentialId entry (left empty / placeholder for file-only DBs).
  database: ""
  options: {}

streams:
  # ----- 1. Patients ----------------------------------------------------
  - kind: PatientUpserted
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)    AS id,
        first_name          AS vorname,
        last_name           AS nachname,
        email               AS email,
        phone_mobile        AS telefon_mobil,
        phone_home          AS telefon_privat,
        date_of_birth       AS geburtsdatum,
        gender              AS geschlecht,
        notes               AS bemerkung,
        modified_at         AS modified_at
      FROM patients
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND patients.id > :cursorTiebreak))
      ORDER BY modified_at ASC, patients.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:patient:{id}:{modified_at}" }
      occurredAt: { from: modified_at, transform: isoDateTime }
      pvsPatientId: id
      fullName: { template: "{vorname} {nachname}" }
      email: { from: email, transform: lowerEmail }
      phone: { from: telefon_mobil, transform: phone }
      dob: { from: geburtsdatum, transform: isoDate }
      gender: { from: geschlecht, transform: gender }
      bemerkung: { from: bemerkung, transform: bemerkung }

  # ----- 2. Appointments ------------------------------------------------
  - kind: AppointmentCreated
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)         AS id,
        CAST(patient_id AS TEXT) AS patient_id,
        scheduled_at             AS termin_zeit,
        treatment_code           AS leistung_code,
        treatment_name           AS leistung_name,
        room_id                  AS raum_id,
        room_name                AS raum_name,
        notes                    AS notiz,
        modified_at              AS modified_at
      FROM appointments
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND appointments.id > :cursorTiebreak))
      ORDER BY modified_at ASC, appointments.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:appointment:{id}" }
      occurredAt: { from: termin_zeit, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsAppointmentId: id
      scheduledAt: { from: termin_zeit, transform: isoDateTime }
      treatmentCode: leistung_code
      treatmentLabel: leistung_name
      locationCode: raum_id
      locationLabel: raum_name
      bemerkung: { from: notiz, transform: bemerkung }

  # ----- 3. Appointment status changes -----------------------------------
  - kind: AppointmentStatusChanged
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)         AS id,
        CAST(patient_id AS TEXT) AS patient_id,
        status                   AS status,
        modified_at              AS modified_at
      FROM appointments
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND appointments.id > :cursorTiebreak))
        AND status IS NOT NULL
      ORDER BY modified_at ASC, appointments.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:appointment-status:{id}:{status}:{modified_at}" }
      occurredAt: { from: modified_at, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsAppointmentId: id
      newStatus: { from: status, transform: appointmentStatus }
      changedAt: { from: modified_at, transform: isoDateTime }

  # ----- 4. Encounters --------------------------------------------------
  - kind: EncounterCompleted
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)             AS id,
        CAST(patient_id AS TEXT)     AS patient_id,
        CAST(appointment_id AS TEXT) AS termin_id,
        completed_at                 AS behandlung_datum,
        treatment_code               AS leistung_code,
        treatment_name               AS leistung_name,
        practitioner_name            AS behandler_name,
        modified_at                  AS modified_at
      FROM encounters
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND encounters.id > :cursorTiebreak))
        AND appointment_id IS NOT NULL
      ORDER BY modified_at ASC, encounters.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:encounter:{id}" }
      occurredAt: { from: behandlung_datum, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsEncounterId: id
      pvsAppointmentId: termin_id
      completedAt: { from: behandlung_datum, transform: isoDateTime }
      treatmentCode: leistung_code
      treatmentLabel: leistung_name
      practitionerLabel: behandler_name

  # ----- 5. Invoices ----------------------------------------------------
  # amountToCents handles "199,00 EUR" / "199.00" / numeric forms; the
  # vendor's actual storage convention is part of the schema-discovery
  # work before going live.
  - kind: InvoicePaid
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)             AS id,
        CAST(patient_id AS TEXT)     AS patient_id,
        CAST(appointment_id AS TEXT) AS termin_id,
        CAST(encounter_id AS TEXT)   AS behandlung_id,
        amount_total                 AS betrag,
        paid_at                      AS bezahlt_am,
        status                       AS status,
        modified_at                  AS modified_at
      FROM invoices
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND invoices.id > :cursorTiebreak))
        AND status = 'paid'
        AND appointment_id IS NOT NULL
      ORDER BY modified_at ASC, invoices.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:invoice:{id}" }
      occurredAt: { from: bezahlt_am, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsInvoiceId: id
      pvsAppointmentId: termin_id
      pvsEncounterId: behandlung_id
      amountCents: { from: betrag, transform: amountToCents }
      currency: { literal: "EUR" }
      paidAt: { from: bezahlt_am, transform: isoDateTime }

  # ----- 6. Recalls ----------------------------------------------------
  - kind: RecallScheduled
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)         AS id,
        CAST(patient_id AS TEXT) AS patient_id,
        recall_at                AS recall_zeit,
        treatment_code           AS leistung_code,
        treatment_name           AS leistung_name,
        modified_at              AS modified_at
      FROM recalls
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND recalls.id > :cursorTiebreak))
      ORDER BY modified_at ASC, recalls.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:recall:{id}" }
      occurredAt: { from: recall_zeit, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsRecallId: id
      recallAt: { from: recall_zeit, transform: isoDateTime }
      treatmentCode: leistung_code
      treatmentLabel: leistung_name

  # ----- 7. Invoice refunds / storno / Gutschrift (Phase 9) --------------
  # InvoiceRefunded: money OUT, one event per refund / credit row, so the
  # derive worker nets the patient total + appointment bucket back down and the
  # P2-3 downgrade alarm catches a gewonnen -> lower flip. refundedAmountCents
  # must be a POSITIVE magnitude (the portal Zod rejects negatives), so it maps
  # through the absAmountToCents transform: the amount may arrive as a negative
  # amount (a credit) or a positive amount on a refunded-status row, and either
  # way the magnitude is taken. Inherits Phase 3 (Date bind, SQLite
  # special-case) + Phase 4 (keyset). No appointment-NOT-NULL filter: an
  # appt-less refund still nets the patient total (derive bridges via the
  # original invoice id).
  # SCHEMA-DISCOVERY DRAFT: storno predicate (amount_total < 0 OR status in
  # refunded/credited) + refundedAt source (modified_at) are guesses; disjoint
  # from InvoicePaid (status = 'paid') by construction.
  # Cancellations stay on stream 3 (AppointmentStatusChanged -> cancelled); no
  # AppointmentCancelled stream until a real schema separates patient- vs
  # Praxis-side cancel.
  - kind: InvoiceRefunded
    cursorColumn: modified_at
    cursorType: timestamp
    tiebreakColumn: id
    query: |
      SELECT
        CAST(id AS TEXT)             AS id,
        CAST(patient_id AS TEXT)     AS patient_id,
        CAST(appointment_id AS TEXT) AS termin_id,
        amount_total                 AS betrag,
        status                       AS status,
        modified_at                  AS modified_at
      FROM invoices
      WHERE (modified_at > :cursor OR (modified_at = :cursor AND invoices.id > :cursorTiebreak))
        AND (amount_total < 0 OR status IN ('refunded', 'credited'))
      ORDER BY modified_at ASC, invoices.id ASC
      LIMIT :limit
    map:
      pvsExternalEventId: { template: "pixelmedics:refund:{id}:{modified_at}" }
      occurredAt: { from: modified_at, transform: isoDateTime }
      pvsPatientId: patient_id
      pvsInvoiceId: id
      pvsAppointmentId: termin_id
      refundedAmountCents: { from: betrag, transform: absAmountToCents }
      refundedAt: { from: modified_at, transform: isoDateTime }
